# Orcastrading — Central Asset Registry
#
# Add new assets here. Each module (P1, P3, P4) reads from this file via core.config.
#
# ticker sources:
#   yfinance   : symbol used with yfinance / stooq
#   eodhd      : symbol used with EODHD API  (format: SYMBOL.EXCHANGE)
#   ccxt       : symbol used with CCXT/Binance (format: BASE/QUOTE)
#   twelvedata : symbol used with Twelve Data API
#
# session times are in exchange-local time (tz-naive, same as yfinance returns).
# GMT+2 equivalents shown in comments for reference.
#
# strategies: list of strategy IDs enabled for this asset.
#   Add/remove here to change what gets scanned for each asset.
#
# Grid search 2026-04-20 (72 combos, all assets × 4 strategies × 3 TFs):
#   Keep criteria: PF >= 1.3  AND  (OOS >= 1.2 OR PF >= 2.0 with no OOS)  AND  n >= 10
#   momentum_breakout: excluded — RR validation bug (now fixed); re-test separately.

assets:

  - id: spx500
    enabled: true
    label: SPX500
    # Grid 2026-04-20: mtf_trend 1d PF=2.41 OOS=2.43 n=338 | ema_continuation 1d PF=1.84 OOS=3.33 n=235
    # MB retest 2026-04-21: momentum_breakout 1d PF=7.19 OOS=999 n=10
    # Short retest 2026-04-21: mtf_trend 1d combined (long+short) PF=1.86 OOS=2.27 n=421 — shorts viable
    # Removed: mtf_trend 1h/4h (PF=0.75/0.11), ema_pullback 1d/4h/1h (OOS < 1.0)
    # Supertrend 2026-04-30: OOS 2024-2026 75% WR, Net PF 3.17 (8 trades)
    baseline:
      win_rate: 0.388
      net_pf: 2.41
      avg_net_pnl_r: 0.813
      max_drawdown_r: 33.0
      kelly_25pct: 0.063
      n_trades: 338
      period: "2015-01-01 to 2026-04-20"
    tickers:
      yfinance: "^GSPC"
      eodhd: "GSPC.INDX"
      stooq: "^SPX"
      twelvedata: "SPX"
      mt5: "US500"
    category: index
    currency: USD
    session:
      open: "09:30"
      close: "16:00"
      timezone: "America/New_York"
    orb:
      opening_range_start: "09:30"
      opening_range_end:   "10:00"
      trade_window_end:    "11:00"
    strategies:
      - id: mtf_trend
        timeframes: [1d]
        params:
          shorts_enabled: true
          pullback_max_atr: 2.0
          adx_threshold: 20
      - id: ema_continuation
        timeframes: [1d]
        params:
          adx_threshold: 22
      - id: momentum_breakout
        timeframes: [1d]
        params: {}
      - id: donchian_breakout
        timeframes: [1d]
        params:
          entry_period: 30
          adx_threshold: 15
          tp1_r: 3.0
          tp2_r: 5.0
      - id: inside_bar
        timeframes: [1d]
        params:
          min_mother_atr: 1.0
          adx_threshold: 15
          tp1_r: 2.0
          tp2_r: 4.0
      - id: heikin_ashi_trend
        timeframes: [1d]
        params:
          consecutive_bull_bars: 2
          require_no_lower_wick: true
          ema_period: 20
          adx_threshold: 20
          tp1_r: 2.0
          tp2_r: 4.0
      # Supertrend 2026-04-30: removed — 5yr full backtest PF=0.65, 21% WR (whipsawed in 2022 bear)
      # Donchian 2026-04-30: grid search Train PF=2.18 (n=84) OOS PF=2.12 (n=51) WR=43% — VALIDATED
      # Inside Bar 2026-04-30: grid search OOS PF=1.39 (n=25) — multi-asset consistent
      # HA Trend 2026-04-30: grid adx=20 OOS PF=2.19 (n=78) WR=47% — VALIDATED

