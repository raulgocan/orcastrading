      rsi_max_long: 70
      ha_sl_lookback: 3
      entry_buffer_atr: 0.05
      sl_buffer_atr: 0.1
      tp1_r: 2.0
      tp2_r: 4.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: false
      win_rate: 0.45
  parabolic_sar_flip:
    name: Parabolic SAR Flip
    description: Parabolic SAR flips from above-price (bearish) to below-price (bullish) with EMA and ADX gate
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.parabolic_sar_flip.ParabolicSARFlipStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. SAR was above price on bar[-2] (bearish SAR)
      2. SAR is below price on bar[-1] (bullish SAR) -- flip occurred
      3. Price > EMA(ema_period) -- in uptrend
      4. ADX >= adx_threshold
      5. RSI(14) <= rsi_max_long
      Entry/exit (long):
        entry = close (flip bar) | SL = SAR value - sl_buffer_atr * ATR
        TP1   = entry + tp1_r * risk | TP2 = entry + tp2_r * risk
    params:
      sar_step: 0.02
      sar_max_step: 0.20
      ema_period: 50
      adx_threshold: 20
      rsi_max_long: 70
      entry_buffer_atr: 0.05
      sl_buffer_atr: 0.15
      tp1_r: 2.0
      tp2_r: 4.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: false
      win_rate: 0.45
  williams_r_reversal:
    name: Williams %R Reversal
    description: Williams %R oversold cross-up in uptrend with EMA and ADX gate -- momentum reversal
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.williams_r_reversal.WilliamsRReversalStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. Williams %R(wr_period) was <= oversold_level on bar[-2]  (e.g. -80)
      2. Williams %R crosses above oversold_level on bar[-1]
      3. Price > EMA(ema_period) -- in uptrend | 4. ADX >= adx_threshold
      Formula: %R = (HH - Close) / (HH - LL) * -100  (range: -100 to 0)
      Entry/exit (long):
        entry = close on cross bar
        SL    = lowest low of sl_lookback bars - sl_buffer_atr * ATR
        TP1   = entry + tp1_r * risk | TP2 = entry + tp2_r * risk
    params:
      wr_period: 14
      oversold_level: -80.0
      overbought_level: -20.0
      ema_period: 50
      adx_threshold: 20
      rsi_max_long: 70
      sl_lookback: 5
      entry_buffer_atr: 0.05
      sl_buffer_atr: 0.1
      tp1_r: 2.0
      tp2_r: 4.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: false
      win_rate: 0.45
