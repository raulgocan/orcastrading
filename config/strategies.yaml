strategies:
  mtf_trend:
    name: MTF Trend
    description: Multi-timeframe EMA pullback — HTF bias + LTF EMA retest + regime
      filter
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 400
    expiry_days: 5
    class: p3_backtester.strategies.mtf_trend.MTFTrendStrategy
    signal_conditions: "LONG signal fires when ALL of the following conditions are\
      \ met:\n1. Weekly trend: weekly EMA20 > weekly EMA50\n2. Daily trend: daily\
      \ EMA20 > daily EMA50\n3. Price pullback to EMA20: |price - EMA20| / ATR <=\
      \ pullback_max_atr\n4. Prior distance: price was >= min_prior_distance_atr ATR\
      \ from EMA20 in last N bars\n5. RSI(14) <= rsi_max (not overbought)\n6. ADX(14)\
      \ >= adx_threshold (trend has minimum strength)\n7. Regime: SMA200 slope is\
      \ bullish (blocks longs in bear markets)\n\nSHORT signal: mirrors long with\
      \ reversed conditions.\n\nEntry/exit (long):\n  entry_low  = EMA20 - (0.3 ×\
      \ ATR)\n  entry_high = EMA20 + (0.5 × ATR)\n  stop_loss  = N-bar swing low -\
      \ (sl_buffer_atr × ATR)\n  risk       = entry_high - stop_loss\n  tp1      \
      \  = entry_high + (tp1_r × risk)\n  tp2        = entry_high + (tp2_r × risk)\n"
    # Optimized 2026-04-20 — grid search GC=F/^DJI/^GSPC 2019-2026, 1296 combos
    # All 3 assets agree: tp2_r=6.0, tp1_alloc=60, shorts_enabled=False (global default)
    # adx_threshold raised 15→22: current too loose, fires in sideways markets
    # tp2_r raised 4.0→6.0: biggest change — MTF Trend setups have long follow-through
    # tp1_r raised 2.5→3.0 (consensus Gold+S&P; US30 prefers 2.0 — use per-asset override)
    # Per-asset overrides for pullback_max_atr and adx_threshold in assets.yaml
    params:
      ema_fast: 20
      ema_slow: 50
      adx_threshold: 22
      adx_threshold_short: 10
      pullback_max_atr: 1.5
      min_prior_distance_atr: 0.8
      prior_lookback: 10
      rsi_max: 70
      rsi_min: 30
      sl_buffer_atr: 0.15
      sl_lookback: 15
      tp1_r: 3.0
      tp2_r: 6.0
      tp1_alloc: 60
      tp2_alloc: 40
      win_rate: 0.50
      regime_filter: true
      shorts_enabled: false
  orb:
    name: Opening Range Breakout
    description: Breakout above/below the opening range — timeframe-agnostic (range
      defined in minutes)
    default_timeframe: 15m
    supported_timeframes:
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    lookback_days: 5
    expiry_days: 1
    class: p3_backtester.strategies.orb.ORBStrategy
    signal_conditions: 'LONG signal fires when ALL of the following conditions are
      met:

      1. Bar closes above opening range high

      2. Bar volume >= volume_multiplier × avg opening-range bar volume

      3. Bar close > session VWAP (if require_vwap_filter=true)

      4. Bar body >= body_pct_min × total bar size (conviction close)

      5. Within trade_window_bars bars after opening range ends

      6. Range size in [range_min_atr_factor, range_max_atr_factor] × daily ATR

      7. RSI <= rsi_max_long

      8. Daily EMA20 > EMA50 (if daily_trend_filter=true)


      Session is skipped if overnight gap > max_gap_pct.

      '
    params:
      opening_range_minutes: 30
      trade_window_minutes: 90
      volume_multiplier: 1.5
      range_min_atr_factor: 0.3
      range_max_atr_factor: 2.5
      body_pct_min: 0.5
      rsi_max_long: 70
      rsi_min_short: 30
      tp1_r: 1.0
      tp2_r: 2.0
      tp1_alloc: 70
      tp2_alloc: 30
      sl_buffer_factor: 0.1
      max_gap_pct: 0.01
      long_enabled: true
      short_enabled: true
      require_vwap_filter: true
      daily_trend_filter: true
  momentum_breakout:
    name: Momentum Breakout
    description: N-period high breakout with volume expansion and HTF bias — any timeframe
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.momentum_breakout.MomentumBreakoutStrategy
    signal_conditions: "LONG signal fires when ALL of the following conditions are\
      \ met:\n1. Close > N-period high (breakout on bar close)\n2. Bar volume >=\
      \ volume_multiplier × N-period avg volume\n3. (close - low) / (high - low) >=\
      \ 1 - close_top_pct  (conviction close, not a wick)\n4. Previous bar ADX(14)\
      \ < adx_max_before  (was in consolidation, not already trending)\n5. RSI(14)\
      \ in [rsi_min, rsi_max]  (momentum building, not overbought)\n6. HTF EMA20\
      \ > EMA50  (higher timeframe trend aligned)\n\nEntry/exit:\n  entry_low  =\
      \ entry_high = breakout close  (market entry on next open)\n  stop_loss  =\
      \ N-period low  (below full consolidation range)\n  consolidation_range = N-period\
      \ high - N-period low\n  tp1 = entry + 1 × consolidation_range  (measured move)\n\
      \  tp2 = entry + 2 × consolidation_range\n  Risk guard: skipped if SL is >\
      \ 20% from entry (range too wide)\n\nNote: TPs are computed from consolidation\
      \ range (measured move), not fixed R multiples.\n"
    # Parameters relaxed from original defaults to fire on trending assets like Gold.
    # Original adx_max_before=25 / volume_multiplier=1.5 / rsi 50-70 produced 0 signals
    # on Gold 2024-2026 because Gold's ADX routinely stays above 25 in a bull trend.
    # Run run_ema_optimization.py equivalent against this strategy before trusting live results.
    params:
      lookback_periods: 20
      volume_multiplier: 1.2   # relaxed from 1.5 — futures volume is noisy
      close_top_pct: 0.25      # bar must close in top 25% of range (conviction filter)
      adx_max_before: 32       # relaxed from 25 — Gold ADX stays elevated in strong trends
      rsi_min: 45              # relaxed from 50 — catch breakouts earlier in momentum cycle
      rsi_max: 75              # relaxed from 70 — allow strong-momentum breakouts
      tp1_alloc: 70
      tp2_alloc: 30
  ema_continuation:
    name: EMA Continuation
    description: EMA pullback entry in a trending market — any timeframe
    default_timeframe: 1d
    supported_timeframes:
    - 15m
    - 30m
    - 1h
    - 4h
    - 1d
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.ema_continuation.EMAContinuationStrategy
    signal_conditions: "LONG signal fires when ALL of the following conditions are\
      \ met:\n1. ADX(14) >= adx_threshold (trend is active)\n2. Price within pullback_max_atr\
      \ × ATR of EMA (pullback has arrived)\n3. Price was >= min_prior_distance_atr\
      \ × ATR from EMA in last 5 bars (genuine pullback)\n4. Daily close > daily EMA200\
      \ (macro regime: bull market only)\n5. RSI(14) <= 65\n\nEntry/exit (long):\n\
      \  entry_low  = EMA - (0.3 × ATR)\n  entry_high = EMA + (0.2 × ATR)\n  stop_loss\
      \  = EMA - (1.0 × ATR)\n  risk       = entry_high - stop_loss\n  tp1       \
      \ = entry_high + (tp1_r × risk)\n  tp2        = entry_high + (tp2_r × risk)\n"
    # Optimized 2026-04-19 — multi-asset grid search GC=F/^GSPC/BTC-USD 2018-2026
    # Consensus: adx=22, tp1_r=3.5, tp2_r=5.0 → mean OOS PF=2.55 (210 trades)
    # Regime learner: atr_pct_max=1.2 → ^GSPC test PF 3.31→3.62 (skip crash/expansion bars)
    params:
      ema_period: 20
      adx_threshold: 22
      pullback_max_atr: 2.0
      min_prior_distance_atr: 0.8
      prior_lookback: 10
      rsi_max: 70
      tp1_r: 3.5
      tp2_r: 5.0
      tp1_alloc: 60
      tp2_alloc: 40
      win_rate: 0.5
      atr_pct_max: 1.2
  ema_pullback:
    name: EMA Pullback
    description: Deep EMA overshoot bounce at structural support — any timeframe
    default_timeframe: 1d
    supported_timeframes:
    - 15m
    - 30m
    - 1h
    - 4h
    - 1d
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.ema_pullback.EMAPullbackStrategy
    signal_conditions: "LONG signal fires when ALL of the following conditions are\
      \ met:\n1. Price is 0.1 – 2.5 × ATR BELOW EMA (deep pullback / overshoot)\n\
      2. RSI(14) < rsi_max (confirms pullback momentum, not reversal)\n3. Nearest support\
      \ is within 1.2 × ATR of current price\n4. ADX(14) >= adx_threshold (minimum\
      \ trend active)\n\nEntry/exit (long):\n  entry_low  = support - (0.2 × ATR)\n\
      \  entry_high = support + (0.2 × ATR)\n  stop_loss  = support - (1.5 × ATR)\n\
      \  risk       = entry_high - stop_loss\n  tp1        = entry_high + (tp1_r ×\
      \ risk)\n  tp2        = entry_high + (tp2_r × risk)\n"
    # Optimized 2026-04-19/20 — multi-asset grid search + regime learner (BTC-USD)
    # Only viable on BTC-USD (Gold/S&P500 consistently negative)
    # require_rsi_divergence=True: BTC OOS PF 1.36→2.10, WR 33%→44% (+55%)
    # Tradeoff: signals drop 350→34 (high selectivity — only take confirmed bounces)
    # New gates (2026-04-20, training signal strong, n=15 test too small to auto-validate):
    #   candle_close_pct_max=0.4: wins close in bottom 24% vs losses 58% — genuine pullback
    #   require_cmf_neutral: CMF neutral WR=48% vs accumulation/distribution WR=0-8%
    #   require_stoch_not_overbought: stoch overbought WR=7% vs oversold WR=41%
    #   require_ema_not_bullish: full bull EMA alignment WR=5% — avoid chasing uptrends
    params:
      ema_period: 20
      adx_threshold: 22
      rsi_max: 55
      tp1_r: 3.0
      tp2_r: 4.0
      tp1_alloc: 70
      tp2_alloc: 30
      win_rate: 0.44
      require_rsi_divergence: true
      require_pin_bar: false
      candle_close_pct_max: 1.0        # off globally — enable per-asset (BTC: 0.4)
      require_cmf_neutral: false        # off globally — enable per-asset (BTC: true)
      require_stoch_not_overbought: false  # off globally — enable per-asset (BTC: true)
      require_ema_not_bullish: false    # off globally — enable per-asset (BTC: true)
  gold_scalper:
    name: Gold Scalper
    description: BRK Gold Scalper v2 — M30 macro + M15 ADX/EMA signal + M5 entry, composite score gate, ATR-scaled SL/TP
    default_timeframe: 5m
    supported_timeframes:
    - 5m
    - 15m
    lookback_days: 10
    expiry_days: 1
    class: p3_backtester.strategies.gold_scalper.GoldScalperStrategy
    signal_conditions: |
      LONG signal fires when composite bull_score >= min_score (default 6/10):
        [2] M30 macro: close > EMA50 > EMA200 AND RSI(M30) > 50
        [2] M15 EMA fresh bull cross (EMA21 crossed above EMA50 on last bar)
            OR [1] M15 EMA trend aligned (EMA21 > EMA50)
        [1] RSI(M15) in 45–68 momentum zone
        [1] M5 EMA8 > EMA21
        [1] Bullish candle pattern on M5 (pin bar / engulf / marubozu / 3-bar continuation)
        [1] ADX(M15) >= adx_min AND DI+ > DI-
        [1] Close > daily VWAP (institutional bias)
        [1] ATR volatility regime: 0.7 ≤ ATR/ATR_MA50 ≤ 2.0

      SHORT: mirrors LONG with reversed conditions. Only fires when shorts_enabled=true.

      Entry/exit (long):
        entry_low  = close - 0.1 × ATR   (tight market-order zone)
        entry_high = close
        stop_loss  = close - sl_mult × ATR
        tp1        = close + tp1_mult × ATR  (tp1_alloc% of position, then SL → breakeven)
        tp2        = close + tp2_mult × ATR  (tp2_alloc% of position, free ride)
    params:
      # Optimized 2026-04-29 — 192-combo grid search, 4-year XAU/USD 5m, longs-only
      # Train 2022-2025 (1226 fills, PF 1.16/1.08 net) | OOS 2025-2026 (734 fills, PF 1.38/1.28 net)
      # Key changes vs defaults: min_score 6→7, sl_mult 1.5→1.0, tp1_mult 1.0→2.0, tp2_mult 2.5→4.0
      # Tight SL (1 ATR) + wide TP (2/4 ATR) captures Gold's strong directional follow-through
      # Shorts disabled: Gold has been in multi-year bull trend; short side loses consistently
      min_score: 7
      ema_f5: 8
      ema_s5: 21
      ema_f15: 21
      ema_s15: 50
      ema_f30: 50
      ema_s30: 200
      adx_period: 14
      adx_min: 22
      rsi_period: 14
      rsi_long_min: 45
      rsi_long_max: 68
      rsi_short_min: 32
      rsi_short_max: 55
      vol_low: 0.7
      vol_high: 2.0
      atr_ma_period: 50
      sl_mult: 1.0
      tp1_mult: 2.0
      tp2_mult: 4.0
      tp1_alloc: 50
      tp2_alloc: 50
      sess_start_utc: 8
      sess_end_utc: 20
      avoid_friday: true
      max_trades_per_day: 3
      use_vwap: true
      shorts_enabled: false
      win_rate: 0.37
  bb_squeeze:
    name: BB Squeeze
    description: Bollinger Band Squeeze breakout — BB contracts inside Keltner Channels, then fires when BB expands
    default_timeframe: 1d
    supported_timeframes:
    - 15m
    - 30m
    - 1h
    - 4h
    - 1d
    lookback_days: 120
    expiry_days: 3
    class: p3_backtester.strategies.bb_squeeze.BBSqueezeStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. Bollinger Bands (bb_period, bb_std) were fully inside Keltner Channel (kc_period, kc_mult×ATR)
         for >= min_squeeze_bars consecutive bars (squeeze active)
      2. Current bar: BB expands OUTSIDE Keltner Channel (squeeze fires/releases)
      3. Close > BB midline (SMA) → long; close < BB midline → short

      Entry/exit (long):
        entry      = close of breakout bar (market order)
        stop_loss  = KC lower band - (sl_buffer_atr × ATR)
        risk       = entry - stop_loss
        tp1        = entry + (tp1_r × risk)
        tp2        = entry + (tp2_r × risk)
    params:
      bb_period: 20
      bb_std: 2.0
      kc_period: 20
      kc_mult: 1.5
      min_squeeze_bars: 5
      sl_buffer_atr: 0.1
      tp1_r: 1.5
      tp2_r: 3.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: true
      win_rate: 0.45
  supertrend:
    name: Supertrend
    description: Supertrend ATR-based trailing stop crossover with HTF trend filter
    default_timeframe: 1d
    supported_timeframes:
    - 15m
    - 30m
    - 1h
    - 4h
    - 1d
    lookback_days: 1825
    expiry_days: 5
    class: p3_backtester.strategies.supertrend.SupertrendStrategy
    signal_conditions: |
      LONG signal fires when:
      1. Supertrend indicator (atr_period, multiplier) flips from DOWNTREND to UPTREND
         (price closes above the upper band on this bar)
      2. HTF EMA20 > EMA50 (if htf_filter=true)

      SHORT signal: mirrors long with reversed conditions.

      Entry/exit (long):
        entry      = close on crossover bar
        stop_loss  = Supertrend line - (sl_buffer_atr × ATR)
        risk       = entry - stop_loss
        tp1        = entry + (tp1_r × risk)
        tp2        = entry + (tp2_r × risk)
    # Optimized 2026-04-30 — 81-combo grid search, Gold/SPX/BTC/Nasdaq daily 2019-2026
    # Best consensus: atr_period=10, multiplier=3.0, tp1_r=3.0, tp2_r=7.0
    # All 4 assets OOS profitable (min OOS Net PF 1.41) — most robust new strategy found
    # multiplier=3.0 is key: wider band = fewer whipsaws, only catches clean trend flips
    # tp2_r=7.0: trend-following setups have long follow-through; captured in OOS 2024-2026
    params:
      atr_period: 10
      multiplier: 3.0
      sl_buffer_atr: 0.05
      htf_filter: true
      tp1_r: 3.0
      tp2_r: 7.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: true
      win_rate: 0.50
  macd_crossover:
    name: MACD Crossover
    description: MACD signal-line crossover with RSI, volume, and HTF trend filters
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 1825
    expiry_days: 5
    class: p3_backtester.strategies.macd_crossover.MACDCrossoverStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. MACD line (fast-slow EMA diff) crosses ABOVE signal line (EMA of MACD)
      2. Histogram is positive (confirms crossover direction)
      3. RSI(rsi_period) <= rsi_max_long (not overbought)
      4. Volume >= volume_mult × 20-bar avg (if volume_mult > 1.0)
      5. HTF EMA20 > EMA50 (if htf_filter=true)
      6. MACD > 0 (if require_above_zero=true — zero-line confirmation)

      SHORT signal: mirrors long with reversed conditions.

      Entry/exit (long):
        entry      = close on crossover bar
        stop_loss  = sl_lookback-bar swing low - (sl_buffer_atr × ATR)
        risk       = entry - stop_loss
        tp1        = entry + (tp1_r × risk)
        tp2        = entry + (tp2_r × risk)
    # Optimized 2026-04-30 — 72-combo grid search, Gold/SPX/BTC/Nasdaq daily 2019-2026
    # WARNING: only validated OOS on Gold (83% WR OOS, gold bull 2024-2026)
    # BTC and Nasdaq lose OOS across all combos — do NOT use on crypto/equity indices
    # Best Gold params: macd_fast=8, macd_slow=21, rsi_max_long=60, tp1_r=3.0, tp2_r=5.0
    # Faster EMA (8/21 vs 12/26) catches momentum shifts earlier on trending assets
    params:
      macd_fast: 8
      macd_slow: 21
      macd_signal: 9
      rsi_period: 14
      rsi_max_long: 60
      rsi_min_short: 40
      require_above_zero: false
      volume_mult: 1.0
      htf_filter: true
      sl_lookback: 10
      sl_buffer_atr: 0.1
      tp1_r: 1.5
      tp2_r: 3.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: true
      win_rate: 0.45
  fibonacci_pullback:
    name: Fibonacci Pullback
    description: Fibonacci retracement pullback -- enter at 38.2/50/61.8% after a significant trend move
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 120
    expiry_days: 4
    class: p3_backtester.strategies.fibonacci_pullback.FibonacciPullbackStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. Significant upswing in last swing_lookback bars: swing_low -> swing_high, range >= min_swing_atr * ATR
      2. Current price between swing_low and swing_high (pullback in progress)
      3. Current price within fib_zone_atr * ATR of a key Fib level (38.2%, 50%, or 61.8%)
      4. Price > EMA(ema_period) -- overall uptrend confirmed
      5. ADX >= adx_threshold -- trend strength
      6. RSI(14) <= rsi_max_long -- not overbought
      SHORT: mirrors long with reversed conditions.
      Entry/exit (long):
        entry = close +/- 0.2 * ATR (at Fib zone)
        SL    = swing_low - sl_buffer_atr * ATR
        TP1   = entry + tp1_r * risk
        TP2   = entry + tp2_r * risk
    params:
      swing_lookback: 30
      min_swing_atr: 3.0
      fib_zone_atr: 0.5
      ema_period: 50
      adx_threshold: 20
      rsi_max_long: 65
      rsi_min_short: 35
      sl_buffer_atr: 0.15
      tp1_r: 2.0
      tp2_r: 4.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: true
      win_rate: 0.45
  rsi_divergence:
    name: RSI Divergence
    description: RSI divergence at swing pivots -- price/RSI disagree, signalling momentum reversal
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 120
    expiry_days: 4
    class: p3_backtester.strategies.rsi_divergence.RSIDivergenceStrategy
    signal_conditions: |
      LONG (bullish divergence) fires when:
      1. Two recent pivot lows found (each lower than pivot_order bars on both sides)
      2. Price at second pivot LOWER than first (lower low)
      3. RSI at second pivot HIGHER than first (higher low in RSI)
      4. RSI at second pivot <= rsi_oversold
      SHORT (bearish divergence): higher price high + lower RSI high + RSI >= rsi_overbought.
      Entry/exit (long):
        entry = close on signal bar
        SL    = min low of last pivot_order*2 bars - sl_buffer_atr * ATR
        TP1   = entry + tp1_r * risk
        TP2   = entry + tp2_r * risk
    params:
      rsi_period: 14
      pivot_order: 5
      lookback: 60
      rsi_oversold: 45.0
      rsi_overbought: 55.0
      max_pivot_gap: 40
      sl_buffer_atr: 0.15
      tp1_r: 1.5
      tp2_r: 3.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: true
      htf_filter: false
      win_rate: 0.45
  inside_bar:
    name: Inside Bar Breakout
    description: Inside bar breakout -- consolidation inside a strong mother bar, then trend continuation breakout
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.inside_bar.InsideBarStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. Mother bar (bar[-2]) range >= min_mother_atr * ATR (significant move)
      2. Current bar is inside bar: high < mother_high AND low > mother_low
      3. Mother bar is bullish (close > open) [if require_mother_direction=true]
      4. ADX >= adx_threshold
      5. RSI(14) <= rsi_max_long
      6. HTF EMA20 > EMA50 [if htf_filter=true]
      SHORT: mirrors long with bearish mother bar.
      Entry/exit (long -- breakout stop):
        entry_low  = inside_bar_high
        entry_high = inside_bar_high + entry_buffer_atr * ATR
        SL         = inside_bar_low - sl_buffer_atr * ATR
        TP1        = entry_high + tp1_r * risk
        TP2        = entry_high + tp2_r * risk
    params:
      min_mother_atr: 1.0
      adx_threshold: 20
      rsi_max_long: 70
      rsi_min_short: 30
      require_mother_direction: true
      htf_filter: true
      entry_buffer_atr: 0.05
      sl_buffer_atr: 0.1
      tp1_r: 2.0
      tp2_r: 4.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: true
      win_rate: 0.45
  donchian_breakout:
    name: Donchian Channel Breakout
    description: N-period high/low channel breakout -- Turtle Trading system for trend-following on any asset
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 120
    expiry_days: 4
    class: p3_backtester.strategies.donchian_breakout.DonchianBreakoutStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. Current close > highest high of last entry_period bars (excluding current)
      2. Breakout distance <= max_breakout_atr * ATR (late-entry filter)
      3. ADX >= adx_threshold (trending, not choppy)
      4. HTF EMA20 > EMA50 [if htf_filter=true]

      SHORT: mirrors long with lowest low.

      Entry/exit (long):
        entry      = close on breakout bar
        SL         = lowest low of exit_period bars - sl_buffer_atr * ATR
        TP1        = entry + tp1_r * risk
        TP2        = entry + tp2_r * risk
    # Optimized 2026-04-30 — 48-combo grid search, SPX/Gold/US30/Silver/BTC daily 2019-2026
    # Best SPX result: entry_period=30, adx=15, tp1_r=3.0, tp2_r=5.0
    # SPX: Train PF=2.18 (n=84) -> OOS PF=2.12 (n=51) WR=43% — most consistent train/OOS this session
    # US30: OOS PF=1.29 (n=37) | BTC: OOS PF=1.17 (n=39) — both consistent
    # Gold/Silver: OOS 25x/14x (regime-biased, need 5yr validation through 2022 bear)
    # adx_threshold=15 key: breakouts can start in moderate trend, 20 was too restrictive
    # tp2_r=5.0: trend-following breakouts have long follow-through on daily
    params:
      entry_period: 30
      exit_period: 10
      adx_threshold: 15
      max_breakout_atr: 1.5
      sl_buffer_atr: 0.1
      htf_filter: true
      tp1_r: 3.0
      tp2_r: 5.0
      tp1_alloc: 50
      tp2_alloc: 50
      shorts_enabled: true
      win_rate: 0.40
  stochastic_bounce:
    name: Stochastic Bounce
    description: Stochastic %K/%D cross from oversold/overbought with EMA trend filter
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.stochastic_bounce.StochasticBounceStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. Stochastic %K crosses ABOVE %D (bull cross)
      2. %K was below oversold_level on the previous bar (originated from oversold zone)
      3. Price > EMA(ema_period) -- in uptrend
      4. ADX >= adx_threshold

      SHORT: %K crosses below %D from overbought zone, price < EMA.

      Entry/exit (long):
        entry = close on cross bar
        SL    = lowest low of sl_lookback bars - sl_buffer_atr * ATR
        TP1   = entry + tp1_r * risk
        TP2   = entry + tp2_r * risk
    params:
      stoch_k: 14
      stoch_d: 3
      stoch_smooth: 3
      oversold_level: 20.0
      overbought_level: 80.0
      ema_period: 50
      adx_threshold: 20
      sl_lookback: 10
      sl_buffer_atr: 0.15
      tp1_r: 1.5
      tp2_r: 3.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: true
      win_rate: 0.45
  engulfing_candle:
    name: Engulfing Candle
    description: Bullish/bearish engulfing candle near EMA -- trend continuation after pullback
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.engulfing_candle.EngulfingCandleStrategy
    signal_conditions: |
      LONG (bullish engulfing) fires when ALL of the following conditions are met:
      1. Previous bar is bearish (close < open)
      2. Current bar is bullish (close > open) AND body fully engulfs previous body:
         curr_open <= prev_close AND curr_close >= prev_open
      3. Price within ema_zone_atr * ATR of EMA(ema_period) -- at the level
      4. ADX >= adx_threshold
      5. RSI(14) <= rsi_max_long
      6. Volume >= volume_mult * 20-bar avg [if volume_mult > 1.0]
      7. HTF EMA20 > EMA50 [if htf_filter=true]

      SHORT (bearish engulfing): mirrors long.

      Entry/exit (long):
        entry = close on engulfing bar
        SL    = low of two-bar pattern - sl_buffer_atr * ATR
        TP1   = entry + tp1_r * risk
        TP2   = entry + tp2_r * risk
    params:
      ema_period: 20
      ema_zone_atr: 1.5
      adx_threshold: 20
      rsi_max_long: 65
      rsi_min_short: 35
      volume_mult: 1.0
      require_close_above_prev_open: true
      htf_filter: true
      sl_buffer_atr: 0.1
      tp1_r: 2.0
      tp2_r: 4.0
      tp1_alloc: 60
      tp2_alloc: 40
      shorts_enabled: true
      win_rate: 0.45
  heikin_ashi_trend:
    name: Heikin Ashi Trend
    description: Consecutive bullish Heikin Ashi bars above EMA with ADX -- trend continuation, no lower wicks
    default_timeframe: 1d
    supported_timeframes:
    - 1h
    - 4h
    - 1d
    - 1wk
    lookback_days: 60
    expiry_days: 3
    class: p3_backtester.strategies.heikin_ashi_trend.HeikinAshiTrendStrategy
    signal_conditions: |
      LONG signal fires when ALL of the following conditions are met:
      1. Last consecutive_bull_bars Heikin Ashi bars are bullish (HA close > HA open)
      2. If require_no_lower_wick=true: HA low == HA open on each bar (no lower wicks)
      3. Price > EMA(ema_period) -- uptrend
      4. ADX >= adx_threshold
      5. RSI(14) <= rsi_max_long
      Entry/exit (long):
        entry = close + entry_buffer_atr * ATR
        SL    = min HA low of last ha_sl_lookback bars - sl_buffer_atr * ATR
        TP1   = entry + tp1_r * risk | TP2 = entry + tp2_r * risk
